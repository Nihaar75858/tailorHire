services:
  db:
    image: postgres:15-alpine
    container_name: tailorhire_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tailorhire_user -d tailorhire"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tailorhire_network

  redis:
    image: redis:7-alpine
    container_name: tailorhire_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tailorhire_network

  backend:
    build: ./server/app
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        python manage.py crontab add &&
        gunicorn app.wsgi:application --bind 0.0.0.0:8000 --reload --timeout 300 --workers 3
      "
    volumes:
      - ./server/app:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tailorhire_network

  frontend:
    build: ./client/app
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_BASE_URL}
    volumes:
      - ./client/app:/app
      - /app/node_modules
    depends_on:
      - backend
    stdin_open: true
    # tty: truedocker-compose build --no-cache
    networks:
      - tailorhire_network

# volumes:
#   sqlite_data:
# ADD volumes section
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

# ADD networks section
networks:
  tailorhire_network:
    driver: bridge