services:
  db:
    image: postgres:15-alpine
    container_name: tailorhire_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-tailorhire}
      - POSTGRES_USER=${POSTGRES_USER:-tailorhire_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-12345678}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tailorhire_user -d tailorhire"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tailorhire_network

  backend:
    build: ./server/app
    environment:
      - DJANGO_SETTINGS_MODULE=app.settings  # Important!
      - PYTHONUNBUFFERED=1
      - DB_HOST=db  # ADD THIS
      - DB_PORT=5432
    ports:
      - "8000:8000"
    volumes:
      - ./server/app:/app
      # - sqlite_data:/app/db
    env_file:
      - ./server/app/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tailorhire_network
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn app.wsgi:application --bind 0.0.0.0:8000 --reload --timeout 300 --workers 2
      "

  frontend:
    build: ./client/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      - ./client/app:/app
      - /app/node_modules
    depends_on:
      - backend
    stdin_open: true
    tty: true

# volumes:
#   sqlite_data:
# ADD volumes section
volumes:
  postgres_data:
    driver: local

# ADD networks section
networks:
  tailorhire_network:
    driver: bridge